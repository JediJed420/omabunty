name: Build ISO

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            wget \
            genisoimage

      - name: Download Ubuntu 24.04 ISO
        run: |
          wget -O /tmp/ubuntu-24.04-live.iso \
            https://releases.ubuntu.com/24.04/ubuntu-24.04.4-desktop-amd64.iso \
            --progress=bar:force

      - name: Build Omabunty ISO
        run: |
          chmod +x iso/build-iso-simple.sh
          cd iso
          ./build-iso-simple.sh

      - name: Verify ISO exists
        run: |
          ls -lh iso/build/omabunty-24.04.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: omabunty-iso
          path: iso/build/omabunty-24.04.iso
          retention-days: 7
