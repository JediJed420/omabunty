# Hyprland default configurations for Omabunty
# These provide base settings that can be overridden by user configs

# Monitors configuration
monitor = , preferred, auto, 1

# Environment variables
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_RUNTIME_DIR,/run/user/1000
env = WAYLAND_DISPLAY,wayland-1
env = HYPRLAND_NO_RENDER,0
env = HYPRLAND_NO_SUBSurface,0

# Input configuration
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }

    sensitivity = 0
    accel_profile = flat
}

# Look and feel
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(dcd7ba)
    col.inactive_border = rgb(1f1f28)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    drop_shadow = true
    shadow_range = 15
    shadow_render_power = 3
    shadow_offset = 0 5
    shadow_color = rgba(1a1a2e, 0.6)

    dim_inactive = false
    dim_strength = 0.05

    blur {
        enabled = true
        size = 7
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
    }
}

animations {
    enabled = yes
    bezier = overshot, 0.05, 1.3, 0.97
    bezier = smoothOut, 0.36, 0, 0.02, 1
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = border, 1, 10, linear
    animation = fade, 1, 7, smoothIn
    animation = workspaces, 1, 6, default, slidevert
}

# Window rules
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = float, title:^(Media viewer)$
windowrule = float, title:^(Transmission)$
windowrule = float, title:^(Volume Control)$
windowrule = float, title:^(Picture-in-Picture)$

group {
    col.border_active = rgb(dcd7ba)
    col.border_inactive = rgb(1f1f28)
    col.border_locked_active = rgb(c34043)
    col.border_locked_inactive = rgb(1f1f28)

    groupbar {
        height = 14
        font_family = JetBrainsMono Nerd Font
        font_size = 10
        text_color = rgb(dcd7ba)
        background_color = rgb(1f1f28)
        padding = 4
        render_titles = true
        scrolling = true
        priority = 10
    }
}

# Dwindle layout
dwindle {
    pseudotile = true
    preserve_split = true
    no_gaps_when_only = false
    force_split = 2
}

# Master layout
master {
    new_is_master = true
    new_on Activate = false
    mfact = 0.5
    orientation = left
    always_center_master = false
}

# Gestures
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# Miscellaneous
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    vfr_actual_refresh_rate = true
    enable_swallow = false
    swallow_regex = ^(wezterm)$
    focus_follows_mouse = true
    no_direct_scanout = false
}