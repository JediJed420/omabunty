# Hyprland keybindings for Omabunty
# Adapted from Omarchy for Ubuntu

# Terminal and launcher
bind = SUPER, RETURN, exec, alacritty
bind = SUPER, SPACE, exec, wofi --show drun
bind = SUPER ALT, RETURN, exec, ~/omabunty/scripts/launch-tmux.sh
bind = SUPER SHIFT, SPACE, exec, cd ~/omabunty && ./scripts/omarchy-menu
bind = SUPER SHIFT, RETURN, exec, firefox

# Window management
bind = SUPER SHIFT, Q, exit
bind = SUPER, Q, killactive
bind = SUPER, J, togglesplit
bind = SUPER, F, fullscreen
bind = SUPER SHIFT, F, pseudo
bind = SUPER, TAB, workspace, previous
bind = SUPER, P, pin

# System controls
bind = SUPER CTRL, L, exec, wlogout
bind = SUPER SHIFT, BACKSPACE, exec, systemctl suspend

# Screenshots
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, PRINT, exec, grim - | wl-copy
bind = SUPER SHIFT, PRINT, exec, hyprpicker -a

# Window navigation
bind = SUPER, LEFT, movefocus, l
bind = SUPER, RIGHT, movefocus, r
bind = SUPER, UP, movefocus, u
bind = SUPER, DOWN, movefocus, d
bind = SUPER SHIFT, LEFT, movewindow, l
bind = SUPER SHIFT, RIGHT, movewindow, r
bind = SUPER SHIFT, UP, movewindow, u
bind = SUPER SHIFT, DOWN, movewindow, d

# Workspace management
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

bind = SUPER ALT, LEFT, moveworkspacetomonitor, l
bind = SUPER ALT, RIGHT, moveworkspacetomonitor, r

# Window management
bind = SUPER, T, togglefloating
bind = SUPER, G, togglegroup
bind = SUPER ALT, G, moveoutofgroup
bind = SUPER ALT, TAB, changegroupactive, f

# Layout management
bind = SUPER, EQUAL, exec, hyprctl keyword workspace "1 gapsin:10"
bind = SUPER, MINUS, exec, hyprctl keyword workspace "1 gapsout:10"

# Scratchpad
bind = SUPER, S, exec, hyprctl workspace special
bind = SUPER ALT, S, movetoworkspace, special

# Audio controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Application launchers
bind = SUPER, E, exec, nautilus
bind = SUPER, N, exec, nvim
bind = SUPER SHIFT, M, exec, spotify

# Special keys
bind = , Mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle