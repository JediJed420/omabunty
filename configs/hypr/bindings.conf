# Hyprland keybindings for Omabunty
# Adapted from Omarchy for Ubuntu

# Terminal and launcher
bind = SUPER, RETURN, exec, alacritty
bind = SUPER, SPACE, exec, wofi --show drun
bind = SUPER ALT, RETURN, exec, alacritty -e tmux

# Window management
bind = SUPER SHIFT, Q, exit

# Application launchers
bind = SUPER SHIFT, RETURN, exec, firefox
bind = SUPER, E, exec, nautilus
bind = SUPER, N, exec, nvim
bind = SUPER SHIFT, M, exec, spotify

# Special keys
bind = , Mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle