[nodejs]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
