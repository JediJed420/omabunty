[nix_shell]
disabled = false
impure_msg = ''
style = "bg:color_orange fg:color_fg0"
symbol = 'оқ  Nix'
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[$symbol ](fg:primary bg:yellow)[оӮҙ](fg:yellow)'
heuristic = false

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[пҒј ](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)'
home_symbol = "у°үҢ "
truncation_symbol = 'оҫҒ '
truncation_length = 2
