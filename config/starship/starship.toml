box = 'bright-blue'
blue	= 'blue'
cyan = 'cyan'
green	= 'green'
orange = 'bright-yellow'
pink = 'bright-red'
purple = 'purple'
red	= 'red'
yellow = 'yellow'

[os]
format = '(fg:current_line)[оӮ¶](fg:orange)[$symbol ](fg:primary bg:orange)[оӮҙ](fg:orange)'
disabled = false

[os.symbols]
Alpine = 'пҢҖ'
Amazon = 'пү°'
Android = 'оңҺ'
Arch = 'пҢғ'
CentOS = 'пҢ„'
Debian = 'пҢҶ'
EndeavourOS = 'пҢў'
Fedora = 'пҢҠ'
FreeBSD = 'пҢҢ'
Garuda = 'п…ј'
Gentoo = 'пҢҚ'
Linux = 'п…ј'
Macos = 'пҢӮ'
Manjaro = 'пҢ’'
Mariner = 'п…ј'
Mint = 'пҢҺ'
NetBSD = 'п…ј'
NixOS = 'пҢ“'
OpenBSD = 'пҢЁ'
OpenCloudOS = 'о®Ә'
openEuler = 'п…ј'
openSUSE = 'пҢ”'
OracleLinux = 'вҠӮвҠғ'
Pop = 'пҢӘ'
Raspbian = 'пҢ•'
