[lua]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[$symbol](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'о Ұ Lua'

[golang]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:cyan)[$symbol](fg:primary bg:cyan)[оӮҙ](fg:cyan bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
