[directory.substitutions]
"Documents" = "у°Ҳҷ"
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "
"dev" = "у°ІӢ "

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:cyan)[$symbol](fg:primary bg:cyan)[оӮҙ](fg:cyan bg:box)[ $branch](fg:foreground bg:box)[оӮҙ](fg:box bg:yellow)'
symbol = 'оңҘ'

[git_status]
disabled = false
format = '[( $all_status $ahead_behind)](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:pink)'
conflicted = 'п“ң '
stashed = 'оөө '
deleted = 'оӘҒ '
renamed = 'у°‘• '
modified = 'оёј '
typechanged = 'у°•Ғ '
staged = '$count:п“җ '
untracked = '$count:пҠң '
diverged = 'оңЁ $ahead_count $behind_count '
ahead = '$count:п…Ҳ '
behind = '$count:п…ү '
up_to_date = 'п’– '

[git_commit]
commit_hash_length = 5
tag_symbol = 'пҖ« '
format = '[ пҗ— $hash $tag](fg:primary bg:pink)[оӮҙ](fg:pink bg:background)'
disabled = false
only_detached = false
tag_disabled = false

[git_state]
disabled = false
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red bg:background)[$state ](fg:primary bg:red)[$progress_current/$progress_total](fg:primary bg:red)[оӮҙ](fg:red bg:background)'
rebase = 'п‘ҝ'
merge = 'пҗҷ'
revert = 'у°•Ң'
cherry_pick = 'оҠӣ'
bisect = 'пҗў'
am = 'пҗҜ'
