$mise\
$mojo\
$nats\
$nim\
$nix_shell\
$nodejs\
$ocaml\
$odin\
$opa\
$package\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$red\
$rlang\
$ruby\
$scala\
$rust\
