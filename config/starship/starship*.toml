# ~/.config/starship.toml
#
# Run in zsh to see palette of available colors:
# for i in {0..255}; do print -Pn "%K{$i} %k%F{$i}${(l:3::0:)i}%f " ${${(M)$((i%6)):#3}:+$'\n'}; done

# Refresh
#eval "$(starship init bash)"
#
#    ~   󰈙      🔑     
# end_left: =   
# end_right: =   
#
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Disable the blank line at the start of the prompt
add_newline = true

# =========prompt=========

format = """
[        ](bg:lcars_blue)
[        ](bg:lcars_blue)\
[](fg:lcars_blue)
[](fg:lcars_blue)\
[ ](bg:lcars_blue)\
[         ](bg:lcars_blue)\
[($status)](bg:lcars_blue)\
[$character](bg:lcars_blue)\
[ ](bg:lcars_blue)\
[ ]()\
[ $sudo](bg:lcars_graytan)\
[ ]()\
[ ${custom.files}${custom.directories}](bg:lcars_tan)\
[ ]()\
[ $battery](bg:lcars_gold)\
[ ]()\
[ ($cmd_duration)](fg:#000000 bg:lcars_orange)\
[ ]()\
$os\
[](fg:lcars_brown)
[ ]()
[](fg:lcars_blue)\
$env_var\
$username\
$hostname\
$localip\
[ ]()\
[](fg:#000000 bg:lcars_graytan)\
$directory\
[ ]()\
[ ](fg:#000000 bg:lcars_tan)\
$git_branch\
$git_status\
$git_commit\
$git_state\
$git_metrics\
$fossil_branch\
$fossil_metrics\
$hg_branch\
$pijul_channel\
$vcsh\
[ ]()\
[ ](fg:#000000 bg:lcars_gold)\
$buf\
$bun\
$c\
$cmake\
$cobol\
$conda\
$crystal\
$daml\
$dart\
$deno\
$dotnet\
