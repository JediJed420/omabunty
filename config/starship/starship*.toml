#$time

# A continuation prompt that displays filled-in arrow
continuation_prompt = "[        ](bg:lcars_blue)"

# Disable the blank line at the start of the prompt
# add_newline = false

# =========palettes=========

# Set "foo" as custom color palette
palette = "foo"

# Define custom colors
[palettes.foo]

# Define new color
#lcars_purple = "purple"
lcars_blue = "blue"
lcars_tan = "#FFAA90"
lcars_gold = "yellow"
lcars_orange = "bright-yellow"
lcars_brown = "red"
#lcars_grayblue = "#774477"
lcars_graytan = "white"

# =======OS===========
#GhostBSD: replace $os with \U000f02a0 󰊠

[os]
format = "[ $symbol ]($style)"
style = "fg:#ffffff bg:lcars_brown"
disabled = false

[os.symbols]
AIX = "➿ "
Alpaquita = " " #alpaca
Alpine = " "
AlmaLinux = " "
Amazon = " "
Android = " " #
Arch = " "
Artix = " "
CachyOS = " "
CentOS = " "
Debian = " "
DragonFly = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = "󰛓 "
Gentoo = " "
#GhostBSD = "󰊠 "
HardenedBSD = "󰞌 "
Illumos = " "
Kali = " "
Linux = " "
Mabox = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "#🌿
NetBSD = " "
NixOS = " "
Nobara = " "
OpenBSD = " " #󰈺
OpenCloudOS = ''
openEuler = ''
openSUSE = " "
OracleLinux = " " #󰌷 ⊂⊃
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
Redox = "󰀘 "
RockyLinux = " "
Solus = "󰠳 " #
SUSE = " "
Ubuntu = " "
Ultramarine = "󰼮 "
Unknown = " "
Void = " "
Windows = " " #

# ==========battery========

[battery]
full_symbol = "󰂃 "
charging_symbol = "⚡️ "
discharging_symbol = "󰁽 "
empty_symbol = '󰂎 '
format = "[$symbol$percentage]($style)"
disabled = false

# [[battery.display]]
# threshold = 25
# style = "bold fg:fg_red2 bg:lcars_gold"

# [[battery.display]]
# threshold = 50
# style = "bold fg:orange bg:lcars_gold"

# [[battery.display]]
# threshold = 75
# style = "bold fg:yellow bg:lcars_gold"

[[battery.display]]
threshold = 100
style = "fg:black bg:lcars_gold"
# style = "bold fg:green bg:lcars_gold"

# ==========sudo========

[sudo]
symbol = "🔑"
style = "fg:#000000 bg:lcars_graytan"
disabled = false

# ==========status========

[cmd_duration] #    
format='[ $duration]($style)'
style='fg:#000000 bg:lcars_orange'

[character]
success_symbol = "[](bold fg:green bg:lcars_blue)" # ✅
error_symbol = "[✘](bold fg:red bg:lcars_blue)" # ⛔
format = "[$symbol](bg:bg_6)"

[status]
disabled = false
format = '[\[$status:$common_meaning\] ](fg:red bg:lcars_blue)'

# =========user/host=========

[env_var.STY]
#variable = 'STY'
style = "fg:#000000 bg:#86BBD8"
format = "[  $env_value ]($style)"
# default=""
# disabled = true

[hostname]
ssh_only = true
style = "fg:#FFFFFF bg:lcars_blue"
format = "[ $hostname ]($style)"
trim_at = "-"
# disabled = true

[username]
show_always = true
style_user = "fg:#FFFFFF bg:lcars_blue"
style_root = "fg:#FFFFFF bold bg:lcars_blue"
format = '[ ($user) ]($style)' # 

[localip]
ssh_only = true
style = "fg:#FFFFFF bg:lcars_blue"
format = '[󰩠 $localipv4 ]($style)'
disabled = false

# ========directory==========

[directory]
style = "bg:lcars_graytan fg:#000000"
format = "[ $read_only $path ]($style)"
read_only = '󰌾 ' #🔒
#read_only_style   = ''
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
home_symbol=" " #🏠
use_os_path_sep = true

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 " # Doc
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Videos" = " "
"Projects" = "󰲋 "
".config" = ""
#"School" = "󰑴"
#"GitHub" = ""
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

# inspired by @lolbat on CodeBerg
[custom.files]
description = "Show files count for current directory"
command = "find ./ -maxdepth 1 -type f | wc -l"
format = "[ 󰈔 $output]($style)"
style = "fg:000000 bg:lcars_tan"
when = "true"

[custom.directories]
description = "Show directory count count for current directory"
command = "find ./ -maxdepth 1 -type d | tail -n +2 | wc -l"
format = "[  $output]($style)"
style = "fg:000000 bg:lcars_tan"
when = "true"

# =========src ctrl=========

[git_branch]
symbol = "" #              |
style = "fg:#000000 bg:lcars_tan"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#000000 bg:lcars_tan"
format = '[ $all_status$ahead_behind ]($style)'
conflicted = '󰞇= $count'
ahead = "⇡ $count "
behind = "⇣ $count "
deleted = "🗑 $count " #
diverged = "󰃻 $count " #
renamed = " $count "
stashed = "📦 $count "
modified = "󰙏 $count " #  
staged = " $count "
untracked = "󰙌 $count " # 🤷󰙌
up_to_date = '✓'

[git_commit]
disabled=true
only_detached=false
tag_disabled=false
tag_symbol = ' '
# tag_max_candidates=1
style = "bg:lcars_tan"
format = "[$symbol$hash$tag ]($style)"
commit_hash_length = 4

[git_state]
disabled=false
style = "bg:lcars_tan"
format = '\([$state( $progress_current/$progress_total)]($style)\) '
cherry_pick = '[🍒 PICKING]'
rebase = '[ REBASING]'
merge = '[ MERGING]'
bisect = '[🔍 BISECTING]'
am = '[AM]'
am_or_rebase = '[AM/REBASE]'
revert = '[󰕍 REVERTING]'
#progress_divider = ' of '

[git_metrics]
added_style = "fg:#000000 bg:lcars_tan"
deleted_style = "fg:#000000 bg:lcars_tan"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'
disabled = false

[fossil_branch]
symbol = '󰘬'
style = " fg:#000000 bg:lcars_tan"
format = '[ $symbol $branch ]($style)'

[hg_branch]
symbol = " "
style = " fg:#000000 bg:lcars_tan"
format = '[ $symbol $branch ]($style)'

[pijul_channel]
symbol = " "
style = " fg:#000000 bg:lcars_tan"
format = '[ $symbol $branch ]($style)'

[vcsh]
symbol = '󰘬'
style = " fg:#000000 bg:lcars_tan"
format = '[ $symbol $branch ]($style)'

