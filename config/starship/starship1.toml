# Omarchy Config
# format = "[$directory$git_branch$git_status]($style)$character"
#
# [character]
# error_symbol = "[✗](bold cyan)"
# success_symbol = "[❯](bold cyan)"
#
# [directory]
# truncation_length = 2
# truncation_symbol = "…/"
# repo_root_style = "bold cyan"
# repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
#
# [git_branch]
# format = "[$branch]($style) "
# style = "italic cyan"
#
# [git_status]
# format     = '[$all_status]($style)'
# style      = "cyan"
# ahead      = "⇡${count} "
# diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
# behind     = "⇣${count} "
# conflicted = " "
# up_to_date = " "
# untracked  = "? "
# modified   = " "
# stashed    = ""
# staged     = ""
# renamed    = ""``
# deleted    = ""



format = '[╭─](red)$os$username[](bg:yellow fg:red)$directory[](fg:yellow bg:cyan)$git_branch$git_status[](fg:cyan bg:blue)$docker_context$conda$pixi[](fg:blue bg:black)$time[ ](fg:black)$line_break$character'




[os]
disabled = false
style = "bg:red fg:white"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:red fg:white"
style_root = "bg:red fg:white"
format = '[ $user @]($style)'

[directory]
style = "fg:bright-white bg:yellow"
format = "[ $path ]($style)"
truncation_length = 0 # dont truncate
truncation_symbol = "…/"
truncate_to_repo = false   # don't cut off at git repo root

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:cyan"
format = '[[ $symbol $branch ](fg:bright-black bg:cyan)]($style)'

[git_status]
style = "bg:cyan"
format = '[[($all_status$ahead_behind )](fg:bright-black bg:cyan)]($style)'

[time]
disabled = false
use_12hr = true
# time_format = "%R"
time_format = "%-I:%M %p"
style = "bg:black"
format = '[[  $time ](fg:white bg:black)]($style)'

[character]
disabled = false
success_symbol = '[╰─λ](bold red)'
error_symbol = '[x](bold green)'
vimcmd_symbol = '[](bold green)'
vimcmd_replace_one_symbol = '[](bold magenta)'
vimcmd_replace_symbol = '[](bold magenta)'
vimcmd_visual_symbol = '[](bold yellow)'
